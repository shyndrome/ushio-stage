<!DOCTYPE html>
<html lang="ja">
  <head>
      <meta charset="UTF-8">
      <link href="index.css" rel="stylesheet" type="text/css" media="all">
      <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.0.0/p5.min.js"></script>
      <script src="index.js"></script>
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500&display=swap" rel="stylesheet"> 
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <link rel="icon" href="https://www.ushio-stage.com/う潮アイコン.png" sizes="any">
      <link rel="icon" href="https://www.ushio-stage.com/う潮アイコン.png" type="image/png">
      <link rel="apple-touch-icon" href="https://www.ushio-stage.com/う潮アイコン.png">
      <title>News | う潮</title>
  </head>
  <body>
    <div id="header_fetch_target"></div>

    <div class="div_main_image_for_phone">
      <img src="ushiotop.jpg" class="main_image">
    </div>

    <div class="contents for_news">
      <div id="news-detail" class="news_detail">
        <!--fetch-->
      </div>
    </div>

    <script>
    fetch('news_data.json')
        .then(response => response.json())
        .then(data => {
            const container = document.querySelector('.news_detail');

            data.forEach((post, index) => {

              const newsLabel = (index === 0) ? '<h1>News</h1>' : '';

              if (post.Layout == "imageSingle_first"){
                var html = `
                    <ul class="newsline" id="news-list">
                      <li>
                        <h1>${newsLabel}</h1>
                        <p class="date">${post.date}</p>
                        <h3>${post.title}</h3>

                        <div class="for_">
                          <div class="news_contents">
                            <img src="${post.imageSingle}" class="imageSingle">
                            <p>${post.contents}</p>
                          </div>
                        </div>
                      </li>
                    </ul>
                  `
              }
              else if (post.Layout == "imageSingle_last"){
                var html = `
                    <ul class="newsline" id="news-list">
                      <li>
                        <h1>${newsLabel}</h1>
                        <p class="date">${post.date}</p>
                        <h3>${newsLabel}${post.title}</h3>

                        <div class="for_">
                          <div class="news_contents">
                            <p>${post.contents}</p>
                            <img src="${post.imageSingle}" class="imageSingle">
                          </div>
                        </div>
                      </li>
                    </ul>
                  `
              }
              else if (post.Layout == "imageDouble"){
                var html = `
                    <ul class="newsline" id="news-list">
                      <li>
                        <h1>${newsLabel}</h1>
                        <p class="date">${post.date}</p>
                        <h3>${newsLabel}${post.title}</h3>

                        <div class="for_">
                          <div class="news_contents">
                            <div class="div_Double">
                              <img src="${post.imageDouble01}" class="imageDouble">
                              <img src="${post.imageDouble02}" class="imageDouble">
                            </div>
                            <p>${post.contents}
                          </p>
                          </div>
                        </div>
                      </li>
                    </ul>
                  `
              }
              else if (post.Layout == "imageDouble"){
                var html = `
                    <ul class="newsline" id="news-list">
                      <li>
                        <h1>${newsLabel}</h1>
                        <p class="date">${post.date}</p>
                        <h3>${newsLabel}${post.title}</h3>

                        <div class="for_">
                          <div class="news_contents">
                            <p>${post.contents}
                          </p>
                          </div>
                        </div>
                      </li>
                    </ul>
                  `
              }
              else {
                var html = `
                    <ul class="newsline" id="news-list">
                      <li>
                        <h1>${newsLabel}</h1>
                        <p class="date">${post.date}</p>
                        <h3>${newsLabel}${post.title}</h3>

                        <div class="for_">
                          <div class="news_contents">
                            <p>${post.contents}
                          </p>
                          </div>
                        </div>
                      </li>
                    </ul>
                  `
              }

                if(container) container.insertAdjacentHTML('beforeend', html);
            });
        });
    </script>

  </body>
</html>
