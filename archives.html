<!DOCTYPE html>
<html lang="ja">
  <head>
      <meta charset="UTF-8">
      <link href="archives.css" rel="stylesheet" type="text/css" media="all">

    	<script src="index.js"></script>
      <link rel="preconnect" href="https://fonts.googleapis.com">

  <body>
    <div id="header_fetch_target"></div>
    
    <div class="ushiotop pcnaga">
      <img src="ushiotop.jpg" class="ushiotop">
    </div>

    <div class="contents">
      <h1>Archives</h1>

      <div class="archives_detail" id="archives_detail"></div>

      <script>
        fetch('archives_data.json')
        .then(response => response.json())
        .then(data => {
            const container = document.querySelector('.archives_detail');

            data.forEach((post, index) => {

              const html = `
                  <div class="archives_article">
                    <a href="news.html#${item.id}">
                      <img src="${item.image}" class="archives_image">
                      <h3>『${item.title}』</h3>
                      <p>news.html#${item.DayAndVenue}</p>
                    </a>
                  </div>
                `

                if(container) container.insertAdjacentHTML('beforeend', html);
            });
        });
      </script>

      <div class="archives_flyer">
        <a href="news.html#20240630"><img src="疾走　本表.jpg" class="flyer">
        <h3>『疾走』</h3>
        <p>2024/9/27 - 29　スタジオ空洞</p></a>
      </div>

      <div class="archives_flyer">
