<!DOCTYPE html>
<html lang="ja">
  <head>
      <meta charset="UTF-8">
      <link href="index.css" rel="stylesheet" type="text/css" media="all">
      <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.0.0/p5.min.js"></script>
    	<script src="index.js"></script>
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New&display=swap" rel="stylesheet">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <link rel="icon" href="https://www.ushio-stage.com/う潮アイコン.png" sizes="any">
      <link rel="icon" href="https://www.ushio-stage.com/う潮アイコン.png" type="image/png">
      <link rel="apple-touch-icon" href="https://www.ushio-stage.com/う潮アイコン.png">
      <title>Archives | う潮</title>
  </head>
  <body>
    <div id="header_fetch_target"></div>

    <div class="contents">
      <h1>Archives</h1>

      <div class="archives_detail" id="archives_detail"></div>

      <script>
        fetch('archives_data.json')
        .then(response => response.json())
        .then(data => {
            const container = document.querySelector('.archives_detail');

            data.forEach(item => {

              const html = `
                  <div class="archives_article">
                    <a href="news.html#${item.news_id}">
                      <img src="${item.image}" class="archives_image">
                    </a>
                    <a href="news.html#${item.news_id}">
                      <h3>『${item.title}』</h3>
                      <p>${item.dayAndVenue}</p>
                    </a>
                  </div>
                `

                if(container) container.insertAdjacentHTML('beforeend', html);
            });
        });
      </script>
    </div>

  </body>
</html>
